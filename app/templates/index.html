<!DOCTYPE html>
<html>
<head>
    <title> "AI-assisted preliminary condition assessment tool"</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <style>
        body {
            font-family: "Segoe UI", Roboto, Arial, sans-serif;
            background-color: #f5f8fa;
            margin: 0;
            padding: 40px;
        }

        .container {
            max-width: 720px;
            margin: auto;
            background: #ffffff;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.05);
        }

        h1 {
            text-align: center;
            color: #1f3a5f;
            margin-bottom: 30px;
            font-weight: 600;
        }

        label {
            font-weight: 500;
            color: #2c3e50;
        }

        input, textarea, select {
            width: 100%;
            padding: 12px;
            margin-top: 6px;
            margin-bottom: 20px;
            border-radius: 6px;
            border: 1px solid #dce3ea;
            font-size: 14px;
        }

        input:focus, textarea:focus, select:focus {
            outline: none;
            border-color: #3a7bd5;
        }

        button {
            width: 100%;
            padding: 14px;
            background-color: #2e6da4;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
        }

        button:hover {
            background-color: #245580;
        }

        .result {
            margin-top: 35px;
            padding: 25px;
            background-color: #f8fbff;
            border-radius: 8px;
            border: 1px solid #e2eefc;
        }

        .prediction {
            padding: 12px;
            margin-bottom: 12px;
            background: #eaf3ff;
            border-radius: 6px;
        }

        .confidence-bar {
            height: 8px;
            background-color: #dce6f5;
            border-radius: 4px;
            overflow: hidden;
            margin-top: 6px;
        }

        .confidence-fill {
            height: 8px;
            background-color: #2e6da4;
        }

        .certainty-high { color: #1e8449; font-weight: 600; }
        .certainty-moderate { color: #d68910; font-weight: 600; }
        .certainty-low { color: #c0392b; font-weight: 600; }

        .disclaimer {
            margin-top: 20px;
            font-size: 12px;
            color: #7f8c8d;
        }

        .loading {
            text-align: center;
            margin-top: 20px;
            color: #5d6d7e;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>AI Clinical Assistant</h1>

    <form id="analyzeForm">
        <label>Age</label>
        <input type="number" id="age" required>

        <label>Gender</label>
        <select id="gender">
            <option value="male">Male</option>
            <option value="female">Female</option>
        </select>

        <label>Duration (days)</label>
        <input type="number" id="duration" required>

        <label>Symptoms (comma separated)</label>
        <textarea id="symptoms" rows="4" required></textarea>

        <button type="submit">Analyze Case</button>
    </form>

    <div id="loading" class="loading" style="display:none;">
        Analyzing case...
    </div>

    <div id="result" class="result" style="display:none;"></div>
</div>

<script>
    const form = document.getElementById("analyzeForm");
    const resultDiv = document.getElementById("result");
    const loadingDiv = document.getElementById("loading");

    form.addEventListener("submit", async function(e) {
        e.preventDefault();

        resultDiv.style.display = "none";
        loadingDiv.style.display = "block";

        const data = {
            age: parseInt(document.getElementById("age").value),
            gender: document.getElementById("gender").value,
            duration: document.getElementById("duration").value,
            symptoms: document.getElementById("symptoms").value
                .split(",")
                .map(s => s.trim())
        };

        const response = await fetch("/analyze", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(data)
        });

        const result = await response.json();

        loadingDiv.style.display = "none";

        if (result.success) {

            let certaintyClass = "";
            if (result.certainty_level === "High") certaintyClass = "certainty-high";
            else if (result.certainty_level === "Moderate") certaintyClass = "certainty-moderate";
            else certaintyClass = "certainty-low";

            resultDiv.style.display = "block";
            resultDiv.innerHTML = `
                <h3>Primary Assessment</h3>
                <div class="prediction">
                    <strong>${result.predictions[0].name}</strong><br>
                    Confidence: ${result.prediction_confidence}<br>
                    Certainty: <span class="${certaintyClass}">
                        ${result.certainty_level}
                    </span>

                    <div class="confidence-bar">
                        <div class="confidence-fill" 
                            style="width:${result.prediction_confidence * 100}%;">
                        </div>
                    </div>
                </div>

                <h4>Other Considerations</h4>
                ${result.predictions.slice(1).map(p =>
                    `<div class="prediction">
                        ${p.name} (${p.probability})
                    </div>`
                ).join("")}

                <div class="disclaimer">
                    ${result.disclaimer}
                </div>
            `;
        } else {
            resultDiv.style.display = "block";
            resultDiv.innerHTML = "An error occurred while analyzing the case.";
        }
    });
</script>

</body>
</html>
